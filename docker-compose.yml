version: "3.9"

# Docker Compose запускает все сервисы одной командой: docker compose up -d
# Каждый сервис — отдельный контейнер в общей виртуальной сети.

services:

  # --- Наш Go сервис ---
  # app:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     DB_HOST: postgres        # имя контейнера = hostname внутри Docker сети
  #     REDIS_ADDR: redis:6379
  #     ...
  #   depends_on:
  #     postgres:
  #       condition: service_healthy   # ждём пока PostgreSQL готов принимать соединения
  #     redis:
  #       condition: service_healthy

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1641golf}
      POSTGRES_DB: ${DB_NAME:-managerFiles}
    volumes:
      - postgres-data:/var/lib/postgresql/data  # данные сохраняются между перезапусками
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- MinIO (S3-совместимое хранилище файлов) ---
